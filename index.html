<!DOCTYPE html>
<html>
<head>
<title>Luxury Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#000,#222,#000);
    overflow:hidden;
    color:white;
}

/* animated background */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle,#d4af37 1px,transparent 1px);
    background-size:50px 50px;
    animation:move 10s linear infinite;
    opacity:.2;
}

@keyframes move{
    from{transform:translate(0,0);}
    to{transform:translate(-100px,-100px);}
}

.container{
    position:relative;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

h1{
    font-size:55px;
    color:#d4af37;
    animation:fade 2s;
    letter-spacing:5px;
}

p{
    font-size:20px;
    margin:20px;
    animation:fade 3s;
}

.heart{
    width:220px;
    height:220px;
    position:relative;
    transform:rotate(-45deg);
    overflow:hidden;
    margin:30px;
    animation:float 3s infinite ease-in-out;
}

.heart img{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:rotate(45deg) scale(1.4);
}

.heart:before,
.heart:after{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    background:inherit;
    border-radius:50%;
}

.heart:before{
    top:-110px;
    left:0;
}

.heart:after{
    left:110px;
    top:0;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:#d4af37;
    color:black;
    font-size:18px;
    cursor:pointer;
    transition:.4s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px #d4af37;
}

@keyframes float{
    50%{
        transform:rotate(-45deg) translateY(-20px);
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>


<body>

<div class="container">

<h1>Love Website</h1>

<div class="heart">
<img src="mingma.jpg">
</div>

<p> Hello Mingma Koirala this is for you ✨</p>

<button>Click here to see our love diary</button>

</div>


</body>
</html>
